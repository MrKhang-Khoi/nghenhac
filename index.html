<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Vinyl Noir — Ứng dụng nghe nhạc MP3 offline với giao diện sang trọng. PWA cài đặt trên Android.">
    <meta name="keywords" content="music player, MP3, PWA, offline, vinyl, nghe nhạc">

    <!-- Open Graph -->
    <meta property="og:title" content="Vinyl Noir — Nghe Nhạc MP3">
    <meta property="og:description" content="Ứng dụng nghe nhạc MP3 offline sang trọng">
    <meta property="og:type" content="website">

    <title>Vinyl Noir — Nghe Nhạc</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Status Banner (Online/Offline) -->
    <div id="status-banner" class="status-banner" role="alert"></div>

    <div id="app">
        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="app-logo">
                <div class="app-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
                <span class="app-logo-text">Vinyl Noir</span>
            </div>
            <div class="header-actions">
                <button id="btn-settings" class="icon-btn" title="Cài đặt & Cache" aria-label="Cài đặt"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <div class="main-content">
            <!-- Now Playing View -->
            <div id="now-playing" class="now-playing">
                <!-- Vinyl Disc -->
                <div class="vinyl-container">
                    <div id="vinyl-disc" class="vinyl-disc">
                        <img id="vinyl-cover" class="vinyl-cover-img" 
                             src="assets/covers/default-cover.jpg" 
                             alt="Ảnh bìa album"
                             onerror="this.src='assets/covers/default-cover.jpg'">
                    </div>
                    <div class="vinyl-center"></div>
                </div>

                <!-- Track Info -->
                <div class="track-info">
                    <h1 id="track-title" class="track-title">Vinyl Noir Player</h1>
                    <p id="track-artist" class="track-artist">Chọn bài hát để phát</p>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div id="progress-wrapper" class="progress-bar-wrapper" role="slider" aria-label="Tiến trình phát nhạc">
                        <div class="progress-track">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="progress-times">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>

                <!-- Player Controls -->
                <div class="player-controls">
                    <button id="btn-mode" class="ctrl-btn" title="Chế độ phát" aria-label="Chế độ phát"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg></button>
                    <button id="btn-prev" class="ctrl-btn" title="Bài trước" aria-label="Bài trước"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
                    <button id="btn-play" class="ctrl-btn play-btn" title="Phát / Tạm dừng" aria-label="Phát hoặc tạm dừng"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>
                    <button id="btn-next" class="ctrl-btn" title="Bài tiếp" aria-label="Bài tiếp"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                    <button id="btn-favorite" class="ctrl-btn" title="Yêu thích" aria-label="Yêu thích"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></button>
                </div>

                <!-- Extra Controls -->
                <div class="extra-controls">
                    <div class="volume-container">
                        <span id="volume-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><path d="M16 9a5 5 0 0 1 0 6"/><path d="M19.364 18.364a9 9 0 0 0 0-12.728"/></svg></span>
                        <input id="volume-slider" class="volume-slider" 
                               type="range" min="0" max="1" step="0.01" value="0.8"
                               aria-label="Âm lượng">
                    </div>
                </div>
            </div>

            <!-- Playlist View -->
            <div id="playlist-view" class="playlist-view hidden">
                <!-- Search -->
                <div class="search-container">
                    <div class="search-bar">
                        <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
                        <input id="search-input" class="search-input" 
                               type="text" 
                               placeholder="Tìm bài hát, nghệ sĩ..."
                               autocomplete="off"
                               aria-label="Tìm kiếm bài hát">
                        <span id="search-clear" class="search-clear"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span>
                    </div>
                </div>

                <!-- Song Count -->
                <div class="song-list-header" style="padding: 0 16px;">
                    <span id="song-count">0 bài hát</span>
                </div>

                <!-- Song List -->
                <div id="song-list" class="song-list">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== NAVIGATION TABS ===== -->
        <nav id="nav-tabs" class="nav-tabs no-mini-player" aria-label="Điều hướng chính">
            <button id="tab-now-playing" class="nav-tab active" aria-label="Đang phát">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg> Đang phát
            </button>
            <button id="tab-playlist" class="nav-tab" aria-label="Danh sách">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg> Danh sách <span id="tab-playlist-count" class="tab-badge"></span>
            </button>
        </nav>

        <!-- ===== MINI PLAYER ===== -->
        <div id="mini-player" class="mini-player">
            <div class="mini-progress">
                <div id="mini-progress-fill" class="mini-progress-fill"></div>
            </div>
            <div class="mini-player-content">
                <img id="mini-cover" class="mini-cover" 
                     src="assets/covers/default-cover.jpg" 
                     alt="Cover"
                     onerror="this.src='assets/covers/default-cover.jpg'">
                <div class="mini-info">
                    <div id="mini-title" class="mini-title">—</div>
                    <div id="mini-artist" class="mini-artist">—</div>
                </div>
                <div class="mini-controls">
                    <button id="mini-play" class="mini-btn" aria-label="Phát/Dừng"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>
                    <button id="mini-next" class="mini-btn" aria-label="Bài tiếp"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== SETTINGS PANEL ===== -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-sheet">
            <div class="settings-header">
                <h2 class="settings-title"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>Cài đặt</h2>
                <button id="settings-close" class="icon-btn" aria-label="Đóng"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            </div>

            <div class="settings-section">
                <div class="settings-label"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>Bộ nhớ Cache</div>
                <div class="cache-info">
                    <span>Dung lượng đã dùng</span>
                    <span id="cache-size" class="cache-size">0 B</span>
                </div>
                <button id="btn-download-all" class="action-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Tải tất cả để nghe offline
                </button>
                <button id="btn-clear-cache" class="action-btn danger">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px;"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg> Xóa toàn bộ cache
                </button>
            </div>

            <div class="settings-section">
                <div class="settings-label"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>Thông tin</div>
                <div class="cache-info">
                    <span>Phiên bản</span>
                    <span>Vinyl Noir v1.0</span>
                </div>
                <div class="cache-info">
                    <span>Trạng thái</span>
                    <span id="connection-status">🟢 Online</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast (notification) -->
    <div id="toast" class="toast"></div>

    <!-- App Script (ES Module) -->
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
